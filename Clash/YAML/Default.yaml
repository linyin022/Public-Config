
# ══ 端口 ══════════════════════════════════════════════════════
mixed-port: 7890          # HTTP + SOCKS5 混合端口（推荐只用这一个）
allow-lan: false          # 是否允许局域网内其他设备接入代理
                          # 个人电脑设 false；软路由/共享代理设 true

# ══ 运行模式 ══════════════════════════════════════════════════
mode: rule                # rule=按规则分流（日常使用）
                          # global=所有流量走代理（调试用）
                          # direct=所有流量直连（调试用）

# ══ 日志 ══════════════════════════════════════════════════════
log-level: warning        # silent / error / warning / info / debug
                          # 日常用 warning；排查问题时改 debug

# ══ 杂项 ══════════════════════════════════════════════════════
ipv6: false               # 不建议新手开启，避免意外问题
find-process-mode: strict # 是否匹配进程名（路由器/软路由推荐 off）
unified-delay: true       # 统一延迟测试：用实际往返时间，更准确
tcp-concurrent: true      # TCP 并发：同时向所有解析 IP 发起连接，选最快的
global-client-fingerprint: chrome  # 全局 TLS 指纹伪装

# ══ 外部控制（Web 面板）══════════════════════════════════════
external-controller: 127.0.0.1:9090
# secret: "your_strong_password"   # 如果对外暴露务必设置密码
external-ui: ui                     # Web UI 存放目录（相对于配置文件目录）
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# geo当前使用可莉的配置
geox-url:
  # geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'
# ══ 配置持久化 ════════════════════════════════════════════════
profile:
  store-selected: true    # 记住你在 Web UI 中的节点选择，重启后不丢失
  store-fake-ip: true     # 持久化 fake-ip 映射表

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: true               # 优先使用 HTTP/3 协议（DoH3），更快
  enhanced-mode: fake-ip        # 推荐模式，速度快，与规则配合最好
  fake-ip-range: 198.18.0.1/16

  # fake-ip 白名单：这些域名不返回假 IP，直接正常解析
  # 主要是局域网服务、NTP、游戏 STUN 等不适合 fake-ip 的场景
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.xboxlive.com"
    - "+.nintendo.net"

  # respect-rules: true         # DNS 解析遵循路由规则（如需国外域名走代理 DNS，开启此项）

  # 解析代理节点域名用的 DNS（避免代理节点域名本身被污染）
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 默认 nameserver：国内 DNS，并发查询取最快结果
  nameserver:
    - system                           # 当地运营商 DNS（一般最快）
    - https://223.5.5.5/dns-query      # 阿里 DoH
    - https://doh.pub/dns-query        # 腾讯 DoH

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:  { ports: [80, 8080-8880], override-destination: true }
    TLS:   { ports: [443, 8443] }
    QUIC:  { ports: [443, 8443] }
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"              # 劫持所有发往 53 端口的 DNS 请求
    - "tcp://any:53"        # 同时劫持 TCP 的 DNS
  auto-detect-interface: true   # 自动识别出口网卡（推荐）
  auto-route: true              # 自动配置系统路由表（TUN 接管全流量的关键）

# 策略组
proxy-groups:
  - name: Proxies
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Orz-3/face@raw/master/Global.png"
    include-all: true

  - name: Telegram
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Semporia/Hand-Painted-icon@master/Social_Media/Telegram.png"
    include-all: true

  - name: AI Suite
    type: select
    icon: "https://cdn.jsdelivr.net/gh/Orz-3/face@master/Unicorn.png"
    include-all: true

# 锚点 - 规则参数
rs_classical_yaml: &rs_classical_yaml { type: http, behavior: classical, interval: 43200, format: yaml }
rs_classical:      &rs_classical      { type: http, behavior: classical, interval: 43200, format: text }
rs_domain:         &rs_domain         { type: http, behavior: domain,    interval: 43200, format: text }
rs_ipcidr:         &rs_ipcidr         { type: http, behavior: ipcidr,    interval: 43200, format: text }
rs_mrs:            &rs_mrs            { type: http, behavior: domain,    interval: 86400, format: mrs  }

# 规则指向
rule-providers:
  ChinaMaxNoMedia:
    <<: *rs_classical_yaml
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMaxNoMedia/ChinaMaxNoMedia_Classical.yaml
    path: ./Rules/ChinaMaxNoMedia
  ChinaMedia:
    <<: *rs_classical_yaml
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMedia/ChinaMedia.yaml
    path: ./Rules/ChinaMedia
  ASNCN:
    <<: *rs_classical
    url: https://cdn.jsdelivr.net/gh/VirgilClyne/GetSomeFries@main/ruleset/ASN.China.list
    path: ./Rules/ASNCN
  Telegram:
    <<: *rs_classical_yaml
    url: https://raw.dler.io/dler-io/Rules/main/Clash/Provider/Telegram.yaml
    path: ./Rules/Telegram
  LAN:
    <<: *rs_classical_yaml
    url: https://raw.dler.io/dler-io/Rules/main/Clash/Provider/LAN.yaml
    path: ./Rules/Lan
  AI:
    <<: *rs_classical_yaml
    url: https://raw.dler.io/dler-io/Rules/main/Clash/Provider/AI%20Suite.yaml
    path: ./Rules/AI

rules:
  - RULE-SET,LAN,DIRECT
  - DOMAIN-SUFFIX,mcdn.bilivideo.com,REJECT
  - DOMAIN-SUFFIX,mcdn.bilivideo.cn,REJECT
  - DOMAIN-SUFFIX,szbdyd.com,REJECT

  # 规则集
  - RULE-SET,Telegram,Telegram
  - RULE-SET,AI,AI Suite
  - RULE-SET,ChinaMedia,DIRECT
  - RULE-SET,ChinaMaxNoMedia,DIRECT
  - RULE-SET,ASNCN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxies